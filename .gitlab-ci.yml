stages:
  - build

# -----------------------------------------------------------------------------
# CI pipeline for esp-aws-iot
#
# Compiles every example application against every supported ESP-IDF release
# on every supported chip target. Each job runs inside the matching official
# `espressif/idf:release-vX.X` Docker image, so no runner-side IDF setup is
# required.
#
# Supported IDF versions and targets are derived from the top-level README.md.
# -----------------------------------------------------------------------------

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

variables:
  GIT_STRATEGY: clone
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_DEPTH: "1"
  IDF_CCACHE_ENABLE: "1"
  # Pedantic build flags matching upstream esp-aws-iot CI conventions.
  PEDANTIC_FLAGS: "-Werror=deprecated-declarations -Wno-error=cpp"

# -----------------------------------------------------------------------------
# Reusable build template.
#
# Variables expected from the matrix:
#   IDF_VERSION : ESP-IDF release tag (e.g. v5.5)
#   EXAMPLE     : Path to the example project relative to the repo root
#   IDF_TARGET  : Chip target (e.g. esp32, esp32s3, esp32c6, esp32c5)
# -----------------------------------------------------------------------------
.build_template:
  stage: build
  image: espressif/idf:release-${IDF_VERSION}
  tags:
    - build
    - internet
  variables:
    EXTRA_CFLAGS: "${PEDANTIC_FLAGS}"
    EXTRA_CXXFLAGS: "${PEDANTIC_FLAGS}"
  before_script:
    - export IDF_PATH="/opt/esp/idf"
    - . ${IDF_PATH}/export.sh
    - idf.py --version
  script:
    - echo "Building ${EXAMPLE} for ${IDF_TARGET} on IDF ${IDF_VERSION}"
    - idf.py -C "${EXAMPLE}" -DIDF_TARGET="${IDF_TARGET}" build
  artifacts:
    when: on_failure
    paths:
      - "${EXAMPLE}/build/log/"
    expire_in: 1 week

# -----------------------------------------------------------------------------
# Shared matrix axes for IDF v5.2 .. v5.4. v5.5 and v6.0 have their own
# matrices below because of differing target/example support.
# -----------------------------------------------------------------------------
.common_examples: &common_examples
  EXAMPLE:
    - examples/mqtt/tls_mutual_auth
    - examples/http/http_mutual_auth
    - examples/thing_shadow
    - examples/jobs
    - examples/fleet_provisioning/fleet_provisioning_with_csr

.common_targets: &common_targets
  IDF_TARGET:
    - esp32
    - esp32s2
    - esp32s3
    - esp32c2
    - esp32c3
    - esp32c6

build:idf-v5.2:
  extends: .build_template
  variables:
    IDF_VERSION: "v5.2"
  parallel:
    matrix:
      - <<: *common_examples
        <<: *common_targets

build:idf-v5.3:
  extends: .build_template
  variables:
    IDF_VERSION: "v5.3"
  parallel:
    matrix:
      - <<: *common_examples
        <<: *common_targets

build:idf-v5.4:
  extends: .build_template
  variables:
    IDF_VERSION: "v5.4"
  parallel:
    matrix:
      - <<: *common_examples
        <<: *common_targets

# IDF v5.5 additionally supports esp32c5 (preview).
build:idf-v5.5:
  extends: .build_template
  variables:
    IDF_VERSION: "v5.5"
  parallel:
    matrix:
      - EXAMPLE:
          - examples/mqtt/tls_mutual_auth
          - examples/http/http_mutual_auth
          - examples/thing_shadow
          - examples/jobs
          - examples/fleet_provisioning/fleet_provisioning_with_csr
        IDF_TARGET:
          - esp32
          - esp32s2
          - esp32s3
          - esp32c2
          - esp32c3
          - esp32c5
          - esp32c6

# IDF v6.0 supports esp32c5 but does not yet include the fleet_provisioning
# example (pending upstream compatibility).
build:idf-v6.0:
  extends: .build_template
  variables:
    IDF_VERSION: "v6.0"
  parallel:
    matrix:
      - EXAMPLE:
          - examples/mqtt/tls_mutual_auth
          - examples/http/http_mutual_auth
          - examples/thing_shadow
          - examples/jobs
        IDF_TARGET:
          - esp32
          - esp32s2
          - esp32s3
          - esp32c2
          - esp32c3
          - esp32c5
          - esp32c6
